<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title> ❤عيد سعيد </title>	    
    <link type="text/css" rel="stylesheet" href="file/default.css">
    <script type="text/javascript" src="file/jquery.min.js"></script>
    <script type="text/javascript" src="file/jscex.min.js"></script>
    <script type="text/javascript" src="file/jscex-parser.js"></script>
    <script type="text/javascript" src="file/jscex-jit.js"></script>
    <script type="text/javascript" src="file/jscex-builderbase.min.js"></script>
    <script type="text/javascript" src="file/jscex-async.min.js"></script>
    <script type="text/javascript" src="file/jscex-async-powerpack.min.js"></script>
    <script type="text/javascript" src="file/function.js" charset="utf-8"></script>
    <script type="text/javascript" src="file/love.js" charset="utf-8"></script>
	<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <audio id="fireworksAudio" src="fireworks.mp3" preload="auto"></audio>
    <script>
        function playAudio() {
            var audio = document.getElementById("myAudio");
            audio.play();
        }
    </script>
	<style>
<style>
body {
    margin: 0;
    padding: 0;
    background: url('background.gif') no-repeat center center fixed;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    z-index: -2;
    overflow: hidden;
}

#wrap {
    width: 90vw !important; /* يأخذ 90% من عرض الشاشة */
    height: 85vh !important; /* يأخذ 85% من طول الشاشة */
    z-index: 10;
    background-color: rgba(0, 0, 0, 0.6) !important; 
    border-radius: 20px;
    position: relative;
    overflow: hidden; 
    box-shadow: 0 0 30px rgba(0,0,0,0.7);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#canvas {
    z-index: 11;
    width: 100% !important;
    height: 100% !important;
}

#code {
    font-size: 2.5vw !important; /* حجم الخط يتغير حسب عرض الشاشة */
    line-height: 1.6;
    font-family: "Arial", sans-serif;
    color: white !important;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    direction: rtl !important;
    text-align: right !important;
    white-space: nowrap; 
    display: none;
    position: absolute; /* لجعل النص يظهر فوق الشجرة بشكل مرتب */
    top: 50px;
    right: 20px;
}

/* للجوالات الصغيرة */
@media screen and (max-width: 600px) {
    #code {
        font-size: 14px !important;
        top: 20px;
        right: 10px;
    }
}
</style>
</style>

</head>
<body>
    <div id="main">
        <div id="error"><a href="http://www.google.cn/chrome/intl/zh-CN/landing_chrome.html?hl=zh-CN&brand=CHMI">Chrome</a> (<a href="http://firefox.com.cn/download/">Firefox</a>)</div>
        <audio autoplay="autoplay" height="100" width="100" id="myAudio">
            <source src="aud.mp3" type="audio/mp3" />
            <embed height="100" width="120" src="aud.mp3" />
        </audio>
        <div id="wrap">
            <div id="text">
                <div id="code">
                    <span class="say">سلام عليكم يا زقه 💞</span><br>
                    <span class="say">كل عام وانتي بخير 🎈</span><br>
                    <span class="say">كل سنة وانتي طيبة 🍀</span><br>
                    <span class="say">حفظك الله من كل سوء 💕</span><br>
                    <span class="say">كل سنة وانتي سندي في الحياة ❤️</span><br>
                    <span class="say">انتي نعمة من الله  ❤️😘</span><br>
					<span class="say">أحبك يا أحلى أخت  ❤️</span><br>
                </div>
            </div>
            <div id="clock-box">
                <span id="clock">577 days 0 hours 0 minutes 0 seconds</span> <!-- Change to "6940 days..." if needed -->
            </div>
            <canvas id="canvas" width="1100" height="680"></canvas>
        </div>
    </div>

    <script>
    (function() {
        var canvas = $('#canvas');
        var wrap = $('#wrap'); // الحصول على المربع المحيط

        if (!canvas[0].getContext) {
            $("#error").show();
            return false;
        }

        // جعل أبعاد الكانفس مطابقة تماماً للمربع الأسود
        var width = wrap.width();
        var height = wrap.height();        
        canvas.attr("width", width);
        canvas.attr("height", height);

        var opts = {
            seed: {
                x: width / 2 - 20,
                color: "rgb(190, 26, 37)",
                scale: width < 600 ? 1 : 2 // تصغير حجم البذرة في الجوال
            },
            branch: [
                // تعديل إحداثيات الشجرة لتكون نسبية لمركز الشاشة
                [width/2, height, width/2 + 35, height*0.36, width/2 - 35, height*0.29, 30, 100, [
                    [width/2 + 5, height*0.73, width/2 - 80, height*0.61, width/2 - 195, height*0.58, 13, 100, [
                        [width/2 - 85, height*0.64, width/2 - 100, height*0.63, width/2 - 140, height*0.58, 2, 40]
                    ]],
                    [width/2 + 15, height*0.65, width/2 + 65, height*0.52, width/2 + 145, height*0.5, 12, 100, [
                        [width/2 + 43, height*0.58, width/2 + 113, height*0.6, width/2 + 126, height*0.62, 3, 80]
                    ]],
                    [width/2 + 4, height*0.41, width/2 + 2, height*0.36, width/2 - 1, height*0.32, 3, 40],
                    [width/2 + 11, height*0.58, width/2 - 122, height*0.36, width/2 - 207, height*0.35, 9, 80, [
                        [width/2 - 108, height*0.42, width/2 - 152, height*0.37, width/2 - 164, height*0.3, 2, 40],
                        [width/2 - 37, height*0.5, width/2 - 100, height*0.46, width/2 - 140, height*0.48, 4, 60]
                    ]],
                    [width/2 + 11, height*0.52, width/2 + 73, height*0.37, width/2 + 143, height*0.32, 6, 100, [
                        [width/2 + 55, height*0.43, width/2 + 111, height*0.4, width/2 + 113, height*0.39, 2, 80]
                    ]]
                ]] 
            ],
            bloom: {
                num: width < 600 ? 400 : 700, // تقليل عدد الورد في الجوال للأداء
                width: width,
                height: height,
            },
            footer: {
                width: width,
                height: 5,
                speed: 10,
            }
        }

        var tree = new Tree(canvas[0], width, height, opts);
        var seed = tree.seed;
        var foot = tree.footer;
        var hold = 1;

        canvas.click(function(e) {
            playAudio(); // تشغيل الأغنية الأصلية
    
    // --- كود صوت الألعاب النارية الجديد ---
    var fwAudio = document.getElementById("fireworksAudio");
    fwAudio.loop = true;  // تفعيل التكرار التلقائي لأن مدته 16 ثانية والألعاب 50 ثانية
    fwAudio.volume = 1.0; // مستوى الصوت 100% في البداية
    fwAudio.play();

    // بعد 5 ثوانٍ (5000 ميلي ثانية) يتم خفض الصوت إلى 40%
    setTimeout(function() {
        fwAudio.volume = 0.4; 
    }, 5000);

    // إيقاف صوت الألعاب النارية تماماً بعد 50 ثانية (انتهاء مدة الألعاب)
    setTimeout(function() {
        fwAudio.pause();
        fwAudio.currentTime = 0; // إعادة الصوت للبداية
    }, 50000);
			// --- كود الألعاب النارية الجديد ---
    var duration = 50 * 1000; // مدة الألعاب النارية (5 ثوانٍ)
    var animationEnd = Date.now() + duration;
    var defaults = { startVelocity: 5, spread: 360, ticks: 100, zIndex: 1 };

    function randomInRange(min, max) {
      return Math.random() * (max - min) + min;
    }

    var interval = setInterval(function() {
      var timeLeft = animationEnd - Date.now();

      if (timeLeft <= 0) {
        return clearInterval(interval);
      }

      var particleCount = 50 * (timeLeft / duration);
      // إطلاق من اليمين ومن اليسار
      confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
      confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
    }, 250);
            var offset = canvas.offset(), x, y;
            x = e.pageX - offset.left;
            y = e.pageY - offset.top;
            if (seed.hover(x, y)) {
                hold = 0; 
                canvas.unbind("click");
                canvas.unbind("mousemove");
                canvas.removeClass('hand');
            }
        }).mousemove(function(e) {
            var offset = canvas.offset(), x, y;
            x = e.pageX - offset.left;
            y = e.pageY - offset.top;
            canvas.toggleClass('hand', seed.hover(x, y));
        });

        var seedAnimate = eval(Jscex.compile("async", function () {
            seed.draw();
            while (hold) {
                $await(Jscex.Async.sleep(10));
            }
            while (seed.canScale()) {
                seed.scale(0.95);
                $await(Jscex.Async.sleep(10));
            }
            while (seed.canMove()) {
                seed.move(0, 2);
                foot.draw();
                $await(Jscex.Async.sleep(10));
            }
        }));

        var growAnimate = eval(Jscex.compile("async", function () {
            do {
                tree.grow();
                $await(Jscex.Async.sleep(10));
            } while (tree.canGrow());
        }));

        var flowAnimate = eval(Jscex.compile("async", function () {
            do {
                tree.flower(2);
                $await(Jscex.Async.sleep(10));
            } while (tree.canFlower());
        }));

        var moveAnimate = eval(Jscex.compile("async", function () {
            tree.snapshot("p1", 240, 0, 610, 680);
            while (tree.move("p1", 500, 0)) {
                foot.draw();
                $await(Jscex.Async.sleep(10));
            }
            foot.draw();
            tree.snapshot("p2", 500, 0, 610, 680);


            $await(Jscex.Async.sleep(300));
            canvas.css("background", "none");
        }));

        var textAnimate = eval(Jscex.compile("async", function () {
            $("#code").show().typewriter();
        }));
	    
        var runAsync = eval(Jscex.compile("async", function () {
            $await(seedAnimate());
            $await(growAnimate());
            $await(flowAnimate());
            $await(moveAnimate());
            textAnimate().start();
        }));

        runAsync().start();
    })();
	
    </script>
</body>
</html>
