<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xml:lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title> ❤عيد سعيد </title>	    
    <link type="text/css" rel="stylesheet" href="file/default.css">
    <script type="text/javascript" src="file/jquery.min.js"></script>
    <script type="text/javascript" src="file/jscex.min.js"></script>
    <script type="text/javascript" src="file/jscex-parser.js"></script>
    <script type="text/javascript" src="file/jscex-jit.js"></script>
    <script type="text/javascript" src="file/jscex-builderbase.min.js"></script>
    <script type="text/javascript" src="file/jscex-async.min.js"></script>
    <script type="text/javascript" src="file/jscex-async-powerpack.min.js"></script>
    <script type="text/javascript" src="file/function.js" charset="utf-8"></script>
    <script type="text/javascript" src="file/love.js" charset="utf-8"></script>
	<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <audio id="fireworksAudio" src="fireworks.mp3" preload="auto"></audio>
    <script>
        function playAudio() {
            var audio = document.getElementById("myAudio");
            audio.play();
        }
    </script>
	<style>
    body {
        margin: 0;
        padding: 0;
        background: url('background.gif') no-repeat center center fixed;
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden; /* يمنع التمرير في الجوال */
    }

    #wrap {
        width: 85vw !important; 
        height: 80vh !important;
        z-index: 10;
        background-color: rgba(0, 0, 0, 0.6) !important; 
        border-radius: 20px;
        position: relative;
        overflow: hidden; 
        box-shadow: 0 0 30px rgba(0,0,0,0.7);
        /* أزلنا الـ flex هنا لضمان عمل الـ absolute للأجزاء الداخلية */
    }

    #canvas {
        display: block;
        z-index: 20 !important; /* رفعه فوق أي طبقة أخرى */
        cursor: pointer; /* لتأكيد أن العنصر قابل للضغط */
        width: 100% !important;
        height: 100% !important;
    }

    #text {
        width: 100% !important;
        position: absolute !important;
        top: 40px !important;
        right: 20px !important; /* المسافة من اليمين */
        z-index: 15;
        direction: rtl !important;
        text-align: right !important;
		pointer-events: none; /* لضمان أن مربع النص لا يحجب الضغط عن الكانفاس */
    }

    #code {
        display: none;
        font-size: 20px !important; /* حجم مناسب للجوال والكمبيوتر */
        line-height: 1.6;
        font-family: "Arial", sans-serif;
        color: white !important;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        white-space: nowrap; 
    }

    /* تعديل حجم الخط للشاشات الكبيرة */
    @media screen and (min-width: 800px) {
        #code { font-size: 28px !important; }
    }

    .say {
        font-weight: bold;
    }

    /* تعديلات خاصة بشاشات الجوال الصغيرة */
    @media screen and (max-width: 600px) {
        #code {
            font-size: 16px !important; /* تصغير الخط للجوال لكي لا يخرج عن المربع */
        }
        #wrap {
            width: 95vw !important;
            height: 85vh !important;
        }
    }
</style>

</head>
<body>
    <div id="main">
        <div id="error"><a href="http://www.google.cn/chrome/intl/zh-CN/landing_chrome.html?hl=zh-CN&brand=CHMI">Chrome</a> (<a href="http://firefox.com.cn/download/">Firefox</a>)</div>
        <audio autoplay="autoplay" height="100" width="100" id="myAudio">
            <source src="aud.mp3" type="audio/mp3" />
            <embed height="100" width="120" src="aud.mp3" />
        </audio>
        <div id="wrap">
            <div id="text">
                <div id="code">
                    <span class="say">سلام عليكم يا زقه 💞</span><br>
                    <span class="say">كل عام وانتي بخير 🎈</span><br>
                    <span class="say">كل سنة وانتي طيبة 🍀</span><br>
                    <span class="say">حفظك الله من كل سوء 💕</span><br>
                    <span class="say">كل سنة وانتي سندي في الحياة ❤️</span><br>
                    <span class="say">انتي نعمة من الله  ❤️😘</span><br>
					<span class="say">أحبك يا أحلى أخت  ❤️</span><br>
                </div>
            </div>
            <div id="clock-box">
                <span id="clock">577 days 0 hours 0 minutes 0 seconds</span> <!-- Change to "6940 days..." if needed -->
            </div>
            <canvas id="canvas" width="1100" height="680"></canvas>
        </div>
    </div>

    <script>
    (function() {
        var canvas = $('#canvas');
        var wrap = $('#wrap');

        if (!canvas[0].getContext) {
            $("#error").show();
            return false;
        }

        // ضبط أبعاد الكانفاس لتطابق حجم المربع الأسود تماماً
        var width = wrap.width();
        var height = wrap.height();        
        canvas.attr("width", width);
        canvas.attr("height", height);

        var opts = {
            seed: {
                x: width / 2, // توسيط القلب تماماً
                y: height / 2,
                color: "rgb(190, 26, 37)",
                scale: 2
            },
            branch: [
                // تعديل إحداثيات الشجرة لتتناسب مع أي حجم شاشة
                [width/2, height, width/2, height*0.4, width/2, height*0.3, 30, 100, [
                    [width/2, height*0.7, width/2 - 80, height*0.6, width/2 - 150, height*0.6, 13, 100, [
                        [width/2 - 85, height*0.63, width/2 - 100, height*0.62, width/2 - 140, height*0.58, 2, 40]
                    ]],
                    [width/2 + 10, height*0.65, width/2 + 60, height*0.52, width/2 + 140, height*0.5, 12, 100, [
                        [width/2 + 38, height*0.58, width/2 + 100, height*0.6, width/2 + 120, height*0.62, 3, 80]
                    ]],
                    [width/2, height*0.4, width/2, height*0.35, width/2, height*0.3, 3, 40]
                ]] 
            ],
            bloom: {
                num: 700,
                width: width,
                height: height,
            },
            footer: {
                width: width,
                height: 5,
                speed: 10,
            }
        }

        var tree = new Tree(canvas[0], width, height, opts);
        var seed = tree.seed;
        var foot = tree.footer;
        var hold = 1;

        canvas.click(function(e) {
            playAudio(); // تشغيل الأغنية الأصلية
    var offset = canvas.offset(); 
    var x = e.pageX - offset.left;
    var y = e.pageY - offset.top;

    // طباعة الإحداثيات في المتصفح للتأكد (اختياري)
    console.log("الضغط في: ", x, y); 

    if (seed.hover(x, y)) {
        hold = 0; 
        canvas.unbind("click");
        canvas.unbind("mousemove");
        canvas.removeClass('hand');
    }

    // --- كود صوت الألعاب النارية الجديد ---
    var fwAudio = document.getElementById("fireworksAudio");
    fwAudio.loop = true;  // تفعيل التكرار التلقائي لأن مدته 16 ثانية والألعاب 50 ثانية
    fwAudio.volume = 1.0; // مستوى الصوت 100% في البداية
    fwAudio.play();

    // بعد 5 ثوانٍ (5000 ميلي ثانية) يتم خفض الصوت إلى 40%
    setTimeout(function() {
        fwAudio.volume = 0.4; 
    }, 5000);

    // إيقاف صوت الألعاب النارية تماماً بعد 50 ثانية (انتهاء مدة الألعاب)
    setTimeout(function() {
        fwAudio.pause();
        fwAudio.currentTime = 0; // إعادة الصوت للبداية
    }, 50000);
			// --- كود الألعاب النارية الجديد ---
    var duration = 50 * 1000; // مدة الألعاب النارية (5 ثوانٍ)
    var animationEnd = Date.now() + duration;
    var defaults = { startVelocity: 5, spread: 360, ticks: 100, zIndex: 1 };

    function randomInRange(min, max) {
      return Math.random() * (max - min) + min;
    }

    var interval = setInterval(function() {
      var timeLeft = animationEnd - Date.now();

      if (timeLeft <= 0) {
        return clearInterval(interval);
      }

      var particleCount = 50 * (timeLeft / duration);
      // إطلاق من اليمين ومن اليسار
      confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
      confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
    }, 250);
            var offset = canvas.offset(), x, y;
            x = e.pageX - offset.left;
            y = e.pageY - offset.top;
            if (seed.hover(x, y)) {
                hold = 0; 
                canvas.unbind("click");
                canvas.unbind("mousemove");
                canvas.removeClass('hand');
            }
        }).mousemove(function(e) {
            var offset = canvas.offset(), x, y;
            x = e.pageX - offset.left;
            y = e.pageY - offset.top;
            canvas.toggleClass('hand', seed.hover(x, y));
        });

        var seedAnimate = eval(Jscex.compile("async", function () {
            seed.draw();
            while (hold) {
                $await(Jscex.Async.sleep(10));
            }
            while (seed.canScale()) {
                seed.scale(0.95);
                $await(Jscex.Async.sleep(10));
            }
            while (seed.canMove()) {
                seed.move(0, 2);
                foot.draw();
                $await(Jscex.Async.sleep(10));
            }
        }));

        var growAnimate = eval(Jscex.compile("async", function () {
            do {
                tree.grow();
                $await(Jscex.Async.sleep(10));
            } while (tree.canGrow());
        }));

        var flowAnimate = eval(Jscex.compile("async", function () {
            do {
                tree.flower(2);
                $await(Jscex.Async.sleep(10));
            } while (tree.canFlower());
        }));

        var moveAnimate = eval(Jscex.compile("async", function () {
            tree.snapshot("p1", 0, 0, width, height);
            // تحريك الشجرة بنسبة 30% من عرض الشاشة لليسار لإفساح مجال للنص
            while (tree.move("p1", width * 0.3, 0)) {
                foot.draw();
                $await(Jscex.Async.sleep(10));
            }
            foot.draw();
            tree.snapshot("p2", width * 0.3, 0, width, height);

            $await(Jscex.Async.sleep(300));
            canvas.css("background", "none");
        }));

        var textAnimate = eval(Jscex.compile("async", function () {
            $("#code").show().typewriter();
        }));
	    
        var runAsync = eval(Jscex.compile("async", function () {
            $await(seedAnimate());
            $await(growAnimate());
            $await(flowAnimate());
            $await(moveAnimate());
            textAnimate().start();
        }));

        runAsync().start();
    })();
	
    </script>
</body>
</html>
