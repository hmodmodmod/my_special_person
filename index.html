	<style>
    /* ===== FIXED SIZE LAYOUT - لا يتأثر بزوم المتصفح ===== */
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
    }

    body {
        background: url('background.gif') no-repeat center center fixed;
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* حاوية خارجية تملأ الشاشة وتمركز المحتوى */
    #main {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    /* الحجم الثابت الأصلي للصندوق */
    #wrap {
        width: 1020px !important;
        height: 680px !important;
        z-index: 10;
        background-color: rgba(0, 0, 0, 0.6) !important;
        border-radius: 20px;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 30px rgba(0,0,0,0.7);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        /* تحويل الحجم ليتناسب مع الشاشة تلقائياً */
        transform-origin: center center;
        transform: scale(var(--scale-factor, 1));
        flex-shrink: 0;
    }

    #canvas {
        z-index: 11;
        width: 1100px !important;
        height: 680px !important;
        max-width: none !important;
        max-height: none !important;
    }

    .say {
        color: white !important;
        text-shadow: 1px 1px 2px black;
        font-weight: bold;
    }

    #code {
        font-size: 24px !important;
        line-height: 1.6;
        font-family: "Arial", sans-serif;
        color: white !important;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        direction: rtl !important;
        text-align: right !important;
        white-space: nowrap;
        display: none;
    }
</style>

<script>
    /* ===== حساب نسبة التكبير/التصغير التلقائي ===== */
    function updateScale() {
        var BASE_W = 1020; // العرض الأصلي للصندوق
        var BASE_H = 680;  // الارتفاع الأصلي للصندوق
        var PADDING = 20;  // هامش من حواف الشاشة

        var vw = window.innerWidth  - PADDING;
        var vh = window.innerHeight - PADDING;

        var scaleX = vw / BASE_W;
        var scaleY = vh / BASE_H;
        var scale  = Math.min(scaleX, scaleY, 1); // لا يكبر أكثر من 1 على سطح المكتب

        document.documentElement.style.setProperty('--scale-factor', scale);
    }

    updateScale();
    window.addEventListener('resize', updateScale);
    window.addEventListener('orientationchange', function() {
        setTimeout(updateScale, 300); // تأخير بسيط بعد تغيير الاتجاه
    });
</script>

</head>
<body>
    <div id="main">
        <div id="error"><a href="http://www.google.cn/chrome/intl/zh-CN/landing_chrome.html?hl=zh-CN&brand=CHMI">Chrome</a> (<a href="http://firefox.com.cn/download/">Firefox</a>)</div>
        <audio autoplay="autoplay" height="100" width="100" id="myAudio">

        <div id="wrap">
            <div id="text">

                    <span class="say">سلام عليكم يا زقه 💞</span><br>

                    <span class="say">انتي نعمة من الله  ❤️😘</span><br>
					<span class="say">أحبك يا أحلى أخت  ❤️</span><br>
                </div>

            <div id="clock-box">

    <script>
    (function() {
        var canvas = $('#canvas');
		
        if (!canvas[0].getContext) {
            $("#error").show();
            return false;
        }

        var width = canvas.width();
        var height = canvas.height();        
        canvas.attr("width", width);
        canvas.attr("height", height);

        var opts = {
            seed: {
                x: width / 2 - 20,
                color: "rgb(190, 26, 37)",
                scale: 2
            },
            branch: [
                [535, 680, 570, 250, 500, 200, 30, 100, [
                    [540, 500, 455, 417, 340, 400, 13, 100, [
                        [450, 435, 434, 430, 394, 395, 2, 40]
                    ]],
                    [550, 445, 600, 356, 680, 345, 12, 100, [
                        [578, 400, 648, 409, 661, 426, 3, 80]
                    ]],
                    [539, 281, 537, 248, 534, 217, 3, 40],
                    [546, 397, 413, 247, 328, 244, 9, 80, [
                        [427, 286, 383, 253, 371, 205, 2, 40],
                        [498, 345, 435, 315, 395, 330, 4, 60]
                    ]],
                    [546, 357, 608, 252, 678, 221, 6, 100, [
                        [590, 293, 646, 277, 648, 271, 2, 80]
                    ]]
                ]] 
            ],
            bloom: {
                num: 700,
                width: 1080,
                height: 650,
            },
            footer: {
                width: 1200,
                height: 5,
                speed: 10,
            }
        }

        var tree = new Tree(canvas[0], width, height, opts);
        var seed = tree.seed;
        var foot = tree.footer;
        var hold = 1;

        canvas.click(function(e) {
            playAudio(); // تشغيل الأغنية الأصلية
    
    // --- كود صوت الألعاب النارية الجديد ---
    var fwAudio = document.getElementById("fireworksAudio");
    fwAudio.loop = true;  // تفعيل التكرار التلقائي لأن مدته 16 ثانية والألعاب 50 ثانية
    fwAudio.volume = 1.0; // مستوى الصوت 100% في البداية
    fwAudio.play();

    // بعد 5 ثوانٍ (5000 ميلي ثانية) يتم خفض الصوت إلى 40%
    setTimeout(function() {
        fwAudio.volume = 0.4; 
    }, 5000);

    // إيقاف صوت الألعاب النارية تماماً بعد 50 ثانية (انتهاء مدة الألعاب)
    setTimeout(function() {
        fwAudio.pause();
        fwAudio.currentTime = 0; // إعادة الصوت للبداية
    }, 50000);
			// --- كود الألعاب النارية الجديد ---
    var duration = 50 * 1000; // مدة الألعاب النارية (5 ثوانٍ)
    var animationEnd = Date.now() + duration;
    var defaults = { startVelocity: 5, spread: 360, ticks: 100, zIndex: 1 };

    function randomInRange(min, max) {
      return Math.random() * (max - min) + min;
    }

    var interval = setInterval(function() {
      var timeLeft = animationEnd - Date.now();

      if (timeLeft <= 0) {
        return clearInterval(interval);
      }

      var particleCount = 50 * (timeLeft / duration);
      // إطلاق من اليمين ومن اليسار
      confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
      confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
    }, 250);
            var offset = canvas.offset(), x, y;
            x = e.pageX - offset.left;
            y = e.pageY - offset.top;
            if (seed.hover(x, y)) {
                hold = 0; 
                canvas.unbind("click");
                canvas.unbind("mousemove");
                canvas.removeClass('hand');
            }
        }).mousemove(function(e) {
            var offset = canvas.offset(), x, y;
            x = e.pageX - offset.left;
            y = e.pageY - offset.top;
            canvas.toggleClass('hand', seed.hover(x, y));
        });

        var seedAnimate = eval(Jscex.compile("async", function () {
            seed.draw();
            while (hold) {
                $await(Jscex.Async.sleep(10));
            }
            while (seed.canScale()) {
                seed.scale(0.95);
                $await(Jscex.Async.sleep(10));
            }
            while (seed.canMove()) {
                seed.move(0, 2);
                foot.draw();
                $await(Jscex.Async.sleep(10));
            }
        }));

        var growAnimate = eval(Jscex.compile("async", function () {
            do {
                tree.grow();
                $await(Jscex.Async.sleep(10));
            } while (tree.canGrow());
        }));

        var flowAnimate = eval(Jscex.compile("async", function () {
            do {
                tree.flower(2);
                $await(Jscex.Async.sleep(10));
            } while (tree.canFlower());
        }));

        var moveAnimate = eval(Jscex.compile("async", function () {
            tree.snapshot("p1", 240, 0, 610, 680);
            while (tree.move("p1", 500, 0)) {
                foot.draw();
                $await(Jscex.Async.sleep(10));
            }
            foot.draw();
            tree.snapshot("p2", 500, 0, 610, 680);


            $await(Jscex.Async.sleep(300));
            canvas.css("background", "none");
        }));

        var textAnimate = eval(Jscex.compile("async", function () {
            $("#code").show().typewriter();
        }));
	    
        var runAsync = eval(Jscex.compile("async", function () {
            $await(seedAnimate());
            $await(growAnimate());
            $await(flowAnimate());
            $await(moveAnimate());
            textAnimate().start();
        }));

        runAsync().start();
    })();
	
    </script>
